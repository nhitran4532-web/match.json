name: Auto Update Gavang JSON
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Create Test Data
        run: |
          echo '{
            "id": "gavang_test",
            "name": "LỊCH THI ĐẤU GÀ VÀNG",
            "image": { "type": "cover", "url": "https://gavang6.live/images/header/gavangtv-logo-v2.png" },
            "groups": [{
              "id": "group-all",
              "name": "⚽ DANH SÁCH TRẬN ĐẤU",
              "display": "vertical",
              "grid_number": 2,
              "channels": [{
                "id": "test-1",
                "name": "🕒 19:00 - Trận Đấu Thử Nghiệm (OK)",
                "type": "single",
                "display": "thumbnail-only",
                "image": { "url": "https://gavang6.live/images/header/gavangtv-logo-v2.png" },
                "sources": []
              }]
            }]
          }' > match.json
      - name: Save changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add match.json
          git commit -m "Test match list" || exit 0
          git push origin main
